<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>Salo's Virtual Solutions</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;background:#0C0820;font-family:-apple-system,'Inter',sans-serif;color:#F0E8FF;overflow-x:hidden;}
  input,select,textarea,button{font-family:inherit;font-size:16px;} /* 16px prevents iOS zoom */
  input[type=checkbox]{accent-color:#E8409A;width:18px;height:18px;}
  ::-webkit-scrollbar{width:4px;} ::-webkit-scrollbar-track{background:#0C0820;} ::-webkit-scrollbar-thumb{background:#251545;border-radius:99px;}
  /* Bottom nav for mobile */
  .bottom-nav{display:none;}
  @media(max-width:768px){
    .sidebar{display:none!important;}
    .bottom-nav{display:flex;position:fixed;bottom:0;left:0;right:0;background:#0A0618;border-top:1px solid #251545;z-index:100;overflow-x:auto;padding:4px 0 env(safe-area-inset-bottom);}
    .main-content{padding:16px!important;padding-bottom:90px!important;}
    .g4{grid-template-columns:1fr 1fr!important;}
    .g3{grid-template-columns:1fr 1fr!important;}
    .g2{grid-template-columns:1fr!important;}
    .scripts-grid{grid-template-columns:1fr!important;height:auto!important;}
    .scripts-list{flex-direction:row!important;overflow-x:auto;flex-wrap:nowrap;gap:8px!important;padding-bottom:4px;}
    .scripts-list > div{min-width:140px!important;flex-shrink:0;}
    .scripts-detail{min-height:300px;}
    .task-row{flex-wrap:wrap;gap:6px!important;}
    .task-badges{display:flex;gap:5px;flex-wrap:wrap;}
    .prod-row{flex-wrap:wrap;}
    .cal-row{flex-wrap:wrap;gap:6px!important;}
  }
  @media(min-width:769px){
    .bottom-nav{display:none!important;}
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef}=React;
const PK="#E8409A",PU="#8B44C8",GO="#F5C842";
const BG="#0C0820",CD="#150D2E",BD="#251545",TX="#F0E8FF",MT="#8B7AAA";
const G=`linear-gradient(135deg,${PK},${PU})`;
const GT={background:G,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",backgroundClip:"text"};

const DEFAULT={
  kpis:{followers:1000,followerGoal:10000,sales:0,commissions:0,phase:1},
  team:[
    {id:"dad",name:"Dad",title:"CEO & Strategy Lead",emoji:"👨‍💼",color:PK,
     resp:["Oversee business direction & 90-day roadmap","Manage Amazon Associates + track commissions","Create Friday 'Mom Life' content via Claude scripts","Post & schedule all Pinterest content (office niche)","Manage Linktree / bio links across all platforms","Approve products before content rotation","Update Goals tracker every Sunday"]},
    {id:"son",name:"Son",title:"Chief Content Officer",emoji:"🎬",color:PU,
     resp:["Create all short-form videos using CapCut AI Video Maker","Post Monday (Office) and Wednesday (Beauty) videos","Post Saturday Amazon Haul videos","Monitor TikTok + Instagram comments — reply within 1 hour","Report posts with 500+ views (Spark Ad candidates)","Repost to YouTube Shorts without TikTok watermark","Update Content Calendar as posts go live"]},
    {id:"wife",name:"Sandra (Wife)",title:"Chief Product Officer",emoji:"👩‍💼",color:GO,
     resp:["Research 2 new Amazon products every week via BSR data","Verify Luxury Beauty (10%) vs Standard (6%) classification","Read reviews — write 'why it converts' notes","Find seasonal product opportunities","Maintain the Products database","Deliver product briefing at Sunday 15-min family check-in"]}
  ],
  calendar:[
    {day:"Monday",type:"Office desk setup / tip",niche:"Office",assigned:"Son",status:"pending"},
    {day:"Wednesday",type:"Skincare demo",niche:"Beauty",assigned:"Son",status:"pending"},
    {day:"Friday",type:"Mom Life relatable",niche:"Beauty",assigned:"Dad",status:"pending"},
    {day:"Saturday",type:"Amazon Haul (4 items)",niche:"Both",assigned:"Son",status:"pending"},
    {day:"Sunday",type:"Family check-in",niche:"—",assigned:"All",status:"pending"}
  ],
  products:[
    {id:1,name:"Medicube Korean Toner Pads 2.0",cat:"Luxury Beauty",rate:10,price:"$25–$50",status:"active",notes:"#1 Amazon Q1 2026 Beauty"},
    {id:2,name:"Hero Cosmetics Mighty Patch",cat:"Luxury Beauty",rate:10,price:"$10–$20",status:"active",notes:"#3 Amazon Q1 2026 — Viral before/after"},
    {id:3,name:"Biodance Bio-Collagen Sheet Masks",cat:"Luxury Beauty",rate:10,price:"$25–$45",status:"active",notes:"#6 Q1 2026 — explosive growth"},
    {id:4,name:"The Ordinary Niacinamide Serum",cat:"Standard Beauty",rate:6,price:"$8–$18",status:"active",notes:"3 SKUs in Q1 Top 25"},
    {id:5,name:"CeraVe / La Roche-Posay Moisturizer",cat:"Standard Beauty",rate:6,price:"$15–$30",status:"active",notes:"Derm-recommended — evergreen"},
    {id:6,name:"Dyson Airwrap / REVLON dupe",cat:"Luxury Beauty",rate:10,price:"$50–$599",status:"active",notes:"$15–60/sale — high ticket"},
    {id:7,name:"Monitor Stand Riser (OPNICE/WALI)",cat:"Office",rate:4,price:"$25–$55",status:"active",notes:"7.5% conversion — 30K+ orders/mo"},
    {id:8,name:"Cable Management Clips & Under-Desk Trays",cat:"Office",rate:4,price:"$10–$25",status:"active",notes:"8%+ conversion rate"},
    {id:9,name:"Ergonomic Laptop Stand (Nulaxy/Boyata)",cat:"Office",rate:4,price:"$25–$55",status:"researching",notes:"Neck/back pain angle"},
    {id:10,name:"Desk Calendar & Planner 2026–27",cat:"Office",rate:4,price:"$12–$30",status:"researching",notes:"Seasonal spikes Jan + Sep"}
  ],
  tasks:[
    {id:1,text:"Set up Amazon Associates + register all social accounts",assigned:"Dad",priority:"high",done:false},
    {id:2,text:"Create unique tracking IDs per product",assigned:"Dad",priority:"high",done:false},
    {id:3,text:"Set up Linktree with all affiliate links",assigned:"Dad",priority:"high",done:false},
    {id:4,text:"Post Monday office video — Week 1 script",assigned:"Son",priority:"high",done:false},
    {id:5,text:"Post Wednesday beauty video — Week 1 script",assigned:"Son",priority:"high",done:false},
    {id:6,text:"Post Friday Mom Life video — Week 1 script",assigned:"Dad",priority:"medium",done:false},
    {id:7,text:"Post Saturday Amazon Haul — Week 1 script",assigned:"Son",priority:"medium",done:false},
    {id:8,text:"Research 2 new products this week",assigned:"Wife",priority:"high",done:false},
    {id:9,text:"Verify Luxury vs Standard Beauty for all products",assigned:"Wife",priority:"high",done:false},
    {id:10,text:"Set up CapCut AI Video Maker + test first script",assigned:"Son",priority:"high",done:false}
  ],
  goals:{
    day30:[{text:"Post 3–4 videos per week consistently",done:false},{text:"Generate 3 Amazon sales (keeps account active)",done:false},{text:"Get 500+ views on at least 1 organic post",done:false},{text:"Register all social accounts in Associates dashboard",done:false}],
    day60:[{text:"Identify best-converting products from Associates dashboard",done:false},{text:"Boost 1 Spark Ad at $20/day for 7 days",done:false},{text:"Add Biodance Collagen Mask + Cable Clips to rotation",done:false},{text:"Publish first roundup: WFH desk + skincare",done:false}],
    day90:[{text:"Introduce Dyson Airwrap or REVLON dupe content",done:false},{text:"Launch Pinterest paid campaign ($5–10/day)",done:false},{text:"Build seasonal gift guide (bridges both niches)",done:false},{text:"Start email list on Mailchimp free tier",done:false}]
  },
  scripts:[
    {id:1,week:1,day:"Monday",product:"Monitor Stand Riser",niche:"Office",content:"[HOOK — 0:00–0:05]\nIf your desk looks like this... keep watching.\n\n[PROBLEM — 0:05–0:15]\nWorking from home is hard enough without staring at a messy desk every single day. No organization, no space, no motivation — and honestly? It was affecting my whole mood before I even started work.\n\n[SOLUTION — 0:15–0:40]\nI found this monitor stand riser on Amazon and it completely changed my setup. It lifts my screen to eye level — so no more neck pain — and underneath there's actual storage space for my pens, notebooks, and charger. The whole desk feels bigger, cleaner, and way more professional. And the best part? It was under fifty dollars.\n\n[CTA — 0:40–0:50]\nLink is in my bio — I only share things I actually use and love. Grab it before the price changes.\n\n#ad — As an Amazon Associate I earn from qualifying purchases."},
    {id:2,week:1,day:"Wednesday",product:"Mighty Patch",niche:"Beauty",content:"[HOOK — 0:00–0:05]\nI put this on before bed. Look what happened by morning.\n\n[PROBLEM — 0:05–0:15]\nOkay so I have been dealing with hormonal breakouts forever, and every time a new one shows up I either pick at it — which I know, I know — or I spend way too much money on products that do nothing.\n\n[SOLUTION — 0:15–0:40]\nThese are Mighty Patch hydrocolloid acne patches by Hero Cosmetics. You stick one on a blemish before you go to sleep — and overnight it literally pulls everything out. No popping, no scarring, no touching it at all. By morning it is visibly flatter, less red, and I did absolutely nothing except sleep. They are under twenty dollars on Amazon.\n\n[CTA — 0:40–0:50]\nLink is in my bio. Get them. Thank me tomorrow morning.\n\n#ad — As an Amazon Associate I earn from qualifying purchases."},
    {id:3,week:1,day:"Friday",product:"Korean Toner Pads + The Ordinary",niche:"Beauty",content:"[HOOK — 0:00–0:05]\nMy skincare routine as a mom is literally four minutes. Here it is.\n\n[PROBLEM — 0:05–0:15]\nNobody tells you that when you become a mom your whole self-care routine just... disappears. There is no time. There is no energy. And your skin knows it.\n\n[SOLUTION — 0:15–0:40]\nSo I stripped everything down to what actually moves the needle. I use a Korean toner pad — just swipe it across my face, done — and then I add two drops of The Ordinary Niacinamide for my pores and uneven skin tone. That is it. Both are on Amazon. Both are under thirty dollars.\n\n[CTA — 0:40–0:50]\nBoth links are in my bio. You deserve four good minutes for yourself.\n\n#ad — As an Amazon Associate I earn from qualifying purchases."},
    {id:4,week:1,day:"Saturday",product:"Amazon Haul — 4 Items",niche:"Both",content:"[HOOK — 0:00–0:05]\nFour things I bought on Amazon this month that I will never stop reordering.\n\n[PRODUCTS — 0:10–0:42]\nNumber one: this monitor stand riser. Under fifty dollars, gives you storage underneath, lifts your screen so your neck stops hurting.\nNumber two: Mighty Patch acne patches. Stick one on at night. Flat by morning.\nNumber three: The Ordinary Niacinamide serum. Nine dollars. Shrinks pores and evens out skin tone.\nNumber four: cable management clips. Getting the cords off my desk made me feel like a completely different person.\n\n[CTA — 0:42–0:55]\nEvery single link is in my bio organized by category. All four together cost less than a hundred dollars. Go.\n\n#ad — As an Amazon Associate I earn from qualifying purchases."}
  ],
  notes:"",
  lastUpdated:new Date().toLocaleDateString()
};

const save=d=>{try{localStorage.setItem("salo-hub-v2",JSON.stringify(d));}catch{}};
const load=()=>{try{const r=localStorage.getItem("salo-hub-v2");return r?JSON.parse(r):null;}catch{return null;}};

const badge=(label,col)=>(
  <span style={{background:col+"22",color:col,border:`1px solid ${col}44`,borderRadius:20,padding:"3px 10px",fontSize:11,fontWeight:700,display:"inline-block",whiteSpace:"nowrap"}}>{label}</span>
);
const Prog=({pct,col})=>(
  <div style={{background:"#060412",borderRadius:99,height:7,overflow:"hidden"}}>
    <div style={{width:`${Math.min(100,pct||0)}%`,height:"100%",background:col||G,borderRadius:99,transition:"width 0.5s"}}/>
  </div>
);

const NAVITEMS=[
  {id:"dashboard",icon:"🏠",label:"Home"},
  {id:"team",icon:"👥",label:"Team"},
  {id:"calendar",icon:"📅",label:"Calendar"},
  {id:"products",icon:"📦",label:"Products"},
  {id:"tasks",icon:"✅",label:"Tasks"},
  {id:"goals",icon:"🎯",label:"Goals"},
  {id:"scripts",icon:"📝",label:"Scripts"},
  {id:"export",icon:"🔄",label:"Export"}
];

function App(){
  const [tab,setTab]=useState("dashboard");
  const [data,setData]=useState(()=>load()||DEFAULT);
  const [selScript,setSelScript]=useState(null);
  const [editKpi,setEditKpi]=useState(false);
  const [newTask,setNewTask]=useState({text:"",assigned:"Dad",priority:"high"});
  const [newProd,setNewProd]=useState({name:"",cat:"Office",rate:4,price:"",notes:""});
  const [addProd,setAddProd]=useState(false);
  const [tfilt,setTfilt]=useState("All");
  const [toast,setToast]=useState("");

  const upd=(k,v)=>{const next={...data,[k]:v,lastUpdated:new Date().toLocaleDateString()};setData(next);save(next);};

  const showToast=msg=>{setToast(msg);setTimeout(()=>setToast(""),2500);};

  const copyText=text=>{
    navigator.clipboard.writeText(text).then(()=>showToast("📋 Copied!")).catch(()=>{
      const ta=document.createElement("textarea");ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);showToast("📋 Copied!");
    });
  };

  const exportBrief=()=>{
    const b=`# Salo's Virtual Solutions — Business Brief\nGenerated: ${new Date().toLocaleDateString()}\n\n## KPIs\n- Followers: ${data.kpis.followers} / ${data.kpis.followerGoal} goal\n- Amazon Sales: ${data.kpis.sales}\n- Commissions: $${Number(data.kpis.commissions).toFixed(2)}\n- Phase: ${data.kpis.phase}\n\n## Active Products\n${data.products.filter(p=>p.status==="active").map(p=>`- ${p.name} | ${p.rate}% | ${p.price}`).join("\n")}\n\n## Pending Tasks\n${data.tasks.filter(t=>!t.done).map(t=>`- [${t.assigned}] ${t.text}`).join("\n")}\n\n## Team Notes\n${data.notes||"(none)"}`;
    copyText(b);
  };

  const s={
    wrap:{display:"flex",minHeight:"100vh",background:BG,color:TX},
    sidebar:{width:190,background:"#0A0618",borderRight:`1px solid ${BD}`,display:"flex",flexDirection:"column",minHeight:"100vh",flexShrink:0},
    main:{flex:1,padding:"24px 20px",paddingBottom:24,minWidth:0,overflowX:"hidden"},
    card:{background:CD,border:`1px solid ${BD}`,borderRadius:14,padding:16,marginBottom:12},
    btn:{background:G,border:"none",borderRadius:12,padding:"12px 20px",color:"#fff",cursor:"pointer",fontWeight:700,fontSize:15,touchAction:"manipulation"},
    btnSm:{background:G,border:"none",borderRadius:10,padding:"8px 14px",color:"#fff",cursor:"pointer",fontWeight:700,fontSize:13,touchAction:"manipulation"},
    btnGh:{background:"transparent",border:`1px solid ${BD}`,borderRadius:10,padding:"8px 14px",color:MT,cursor:"pointer",fontSize:13,touchAction:"manipulation"},
    btnDanger:{background:"transparent",border:"1px solid #F8717144",borderRadius:10,padding:"8px 12px",color:"#F87171",cursor:"pointer",fontSize:13,touchAction:"manipulation"},
    inp:{background:BG,border:`1px solid ${BD}`,borderRadius:10,padding:"12px 14px",color:TX,fontSize:16,outline:"none",width:"100%",boxSizing:"border-box"},
    inpSm:{background:"transparent",border:"none",borderBottom:`1px solid ${BD}`,padding:"4px 6px",color:TX,fontSize:14,outline:"none",width:"100%",boxSizing:"border-box"},
    ta:{background:BG,border:`1px solid ${BD}`,borderRadius:10,padding:12,color:TX,fontSize:15,outline:"none",width:"100%",boxSizing:"border-box",resize:"vertical",fontFamily:"inherit",lineHeight:1.6},
    lbl:{fontSize:11,color:MT,textTransform:"uppercase",letterSpacing:"0.8px",marginBottom:6,display:"block"},
    h1:{fontSize:20,fontWeight:800,marginBottom:4},
  };

  // ── DASHBOARD ──
  const Dashboard=()=>{
    const done=data.tasks.filter(t=>t.done).length;
    const fpct=Math.round((data.kpis.followers/data.kpis.followerGoal)*100);
    const spct=Math.min(100,Math.round((data.kpis.sales/3)*100));
    const tpct=data.tasks.length?Math.round((done/data.tasks.length)*100):0;
    return(
      <div>
        <h1 style={{...s.h1,...GT}}>✨ Salo's Virtual Solutions</h1>
        <p style={{color:MT,marginBottom:20,fontSize:12}}>Family Business Hub · {data.lastUpdated}</p>
        <div className="g4" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
          {[
            {icon:"👥",val:data.kpis.followers.toLocaleString(),lbl:"Followers",sub:`Goal: ${data.kpis.followerGoal.toLocaleString()}`,pct:fpct,col:PK},
            {icon:"🛒",val:data.kpis.sales,lbl:"Sales",sub:"Need 3 min.",pct:spct,col:PU},
            {icon:"💰",val:`$${Number(data.kpis.commissions).toFixed(2)}`,lbl:"Commissions",sub:"This month",pct:null},
            {icon:"✅",val:`${done}/${data.tasks.length}`,lbl:"Tasks Done",sub:`${tpct}% done`,pct:tpct,col:"#4ADE80"}
          ].map((k,i)=>(
            <div key={i} style={{background:CD,border:`1px solid ${BD}`,borderRadius:14,padding:"14px"}}>
              <div style={{fontSize:18,marginBottom:5}}>{k.icon}</div>
              <div style={{fontSize:22,fontWeight:900,...GT}}>{k.val}</div>
              <div style={{fontWeight:700,fontSize:12,marginBottom:2}}>{k.lbl}</div>
              <div style={{fontSize:11,color:MT,marginBottom:k.pct!=null?7:0}}>{k.sub}</div>
              {k.pct!=null&&<Prog pct={k.pct} col={k.col}/>}
            </div>
          ))}
        </div>
        {editKpi&&(
          <div style={{...s.card}}>
            <p style={{fontWeight:700,marginBottom:10}}>Update KPIs</p>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {[["Followers","followers"],["Sales","sales"],["Commissions ($)","commissions"],["Phase (1–3)","phase"]].map(([l,k])=>(
                <div key={k}><label style={s.lbl}>{l}</label>
                  <input style={s.inp} type="number" inputMode="numeric" value={data.kpis[k]} onChange={e=>upd("kpis",{...data.kpis,[k]:Number(e.target.value)})}/></div>
              ))}
            </div>
          </div>
        )}
        <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
          <button style={{...s.btnSm,background:editKpi?"#1a0d36":G,border:editKpi?`1px solid ${BD}`:"none"}} onClick={()=>setEditKpi(!editKpi)}>{editKpi?"✓ Done":"✏️ Update KPIs"}</button>
        </div>
        <div style={s.card}>
          <p style={{fontWeight:700,marginBottom:8,fontSize:14}}>📍 Phase</p>
          {badge(["","Phase 1: Build Proof","Phase 2: Double Down","Phase 3: High Ticket"][data.kpis.phase]||"Phase 1",PK)}
        </div>
        {/* ── PERSONAL TASK REMINDERS ── */}
        <div style={{marginBottom:12}}>
          <p style={{fontWeight:700,fontSize:14,marginBottom:10}}>🔔 Pending Tasks by Person</p>
          <div className="g3" style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
            {data.team.map(m=>{
              const pending=data.tasks.filter(t=>t.assigned===m.name.split(" ")[0]&&!t.done);
              const urgent=pending.filter(t=>t.priority==="high");
              return(
                <div key={m.id} style={{background:CD,border:`2px solid ${pending.length>0?m.color+"66":BD}`,borderRadius:14,padding:14,position:"relative",overflow:"hidden"}}>
                  {/* Glow bar at top */}
                  {pending.length>0&&<div style={{position:"absolute",top:0,left:0,right:0,height:3,background:`linear-gradient(90deg,${m.color},${m.color}44)`}}/>}
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                    <span style={{fontSize:22}}>{m.emoji}</span>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontWeight:800,fontSize:13}}>{m.name.split(" ")[0]}</div>
                      <div style={{fontSize:10,color:MT}}>{m.title.split(" ")[0]}</div>
                    </div>
                    {pending.length>0?(
                      <div style={{background:urgent.length>0?"#F87171":GO,color:"#0C0820",borderRadius:99,minWidth:24,height:24,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:13,padding:"0 6px",flexShrink:0}}>
                        {pending.length}
                      </div>
                    ):(
                      <div style={{background:"#4ADE8022",color:"#4ADE80",borderRadius:99,padding:"2px 8px",fontSize:11,fontWeight:700}}>✓ Done</div>
                    )}
                  </div>
                  {pending.length>0?(
                    <div style={{display:"flex",flexDirection:"column",gap:5}}>
                      {pending.slice(0,3).map((t,j)=>(
                        <div key={j} style={{display:"flex",gap:6,alignItems:"flex-start",padding:"5px 7px",background:BG,borderRadius:7,borderLeft:`2px solid ${t.priority==="high"?"#F87171":t.priority==="medium"?GO:MT}`}}>
                          <span style={{fontSize:10,marginTop:1,flexShrink:0,color:t.priority==="high"?"#F87171":t.priority==="medium"?GO:MT}}>●</span>
                          <span style={{fontSize:11,lineHeight:1.35,color:TX}}>{t.text}</span>
                        </div>
                      ))}
                      {pending.length>3&&(
                        <div style={{fontSize:11,color:MT,textAlign:"center",padding:"3px 0"}}>+{pending.length-3} more task{pending.length-3>1?"s":""}</div>
                      )}
                    </div>
                  ):(
                    <div style={{fontSize:12,color:MT,textAlign:"center",padding:"8px 0"}}>All caught up! 🎉</div>
                  )}
                </div>
              );
            })}
          </div>
        </div>

        <div style={s.card}>
          <p style={{fontWeight:700,marginBottom:10,fontSize:14}}>📅 This Week</p>
          <div style={{display:"flex",flexDirection:"column",gap:7}}>
            {data.calendar.map((c,i)=>(
              <div key={i} style={{padding:"10px 12px",background:BG,borderRadius:10}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:5}}>
                  <span style={{fontWeight:700,color:PK,fontSize:13}}>{c.day}</span>
                  {badge(c.status,c.status==="done"?"#4ADE80":c.status==="in-progress"?GO:MT)}
                </div>
                <div style={{fontSize:12,color:TX,marginTop:3}}>{c.type}</div>
                <div style={{fontSize:11,color:MT}}>👤 {c.assigned}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
    );
  };

  // ── TEAM ──
  const Team=()=>{
    const [editing,setEditing]=useState(null);
    const [draft,setDraft]=useState(null);
    const [newResp,setNewResp]=useState("");
    const startEdit=m=>{setEditing(m.id);setDraft({...m,resp:[...m.resp]});setNewResp("");};
    const cancelEdit=()=>{setEditing(null);setDraft(null);};
    const saveEdit=()=>{upd("team",data.team.map(m=>m.id===editing?{...draft}:m));setEditing(null);setDraft(null);showToast("✅ Saved!");};
    const updResp=(i,v)=>setDraft(d=>({...d,resp:d.resp.map((r,j)=>j===i?v:r)}));
    const delResp=i=>setDraft(d=>({...d,resp:d.resp.filter((_,j)=>j!==i)}));
    const addResp=()=>{if(!newResp.trim())return;setDraft(d=>({...d,resp:[...d.resp,newResp.trim()]}));setNewResp("");};
    return(
      <div>
        <h1 style={{...s.h1,...GT,marginBottom:6}}>👥 Team Hub</h1>
        <p style={{color:MT,marginBottom:16,fontSize:12}}>Tap ✏️ Edit to update roles</p>
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          {data.team.map(m=>{
            const isEd=editing===m.id;const d=isEd?draft:m;
            return(
              <div key={m.id} style={{...s.card,borderLeft:`4px solid ${m.color}`}}>
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
                  <div style={{fontSize:30}}>{m.emoji}</div>
                  <div style={{flex:1,minWidth:0}}>
                    {isEd?(
                      <div style={{display:"flex",flexDirection:"column",gap:7}}>
                        <input style={s.inp} value={d.name} onChange={e=>setDraft(x=>({...x,name:e.target.value}))} placeholder="Name"/>
                        <input style={s.inp} value={d.title} onChange={e=>setDraft(x=>({...x,title:e.target.value}))} placeholder="Title"/>
                      </div>
                    ):(
                      <><div style={{fontSize:15,fontWeight:800}}>{m.name}</div><div style={{marginTop:4}}>{badge(m.title,m.color)}</div></>
                    )}
                  </div>
                  <div style={{display:"flex",gap:6,flexShrink:0}}>
                    {isEd?(<><button onClick={saveEdit} style={s.btnSm}>✓</button><button onClick={cancelEdit} style={s.btnGh}>✕</button></>):(<button onClick={()=>startEdit(m)} style={s.btnGh}>✏️</button>)}
                  </div>
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:5}}>
                  {(isEd?draft.resp:m.resp).map((r,j)=>(
                    <div key={j} style={{display:"flex",gap:8,alignItems:"flex-start",padding:"8px 10px",background:BG,borderRadius:8}}>
                      <span style={{color:m.color,fontSize:11,marginTop:2}}>▸</span>
                      {isEd?(
                        <><input style={{...s.inpSm,flex:1}} value={r} onChange={e=>updResp(j,e.target.value)}/>
                        <button onClick={()=>delResp(j)} style={{background:"none",border:"none",color:"#F87171",cursor:"pointer",fontSize:16,padding:"0 4px",flexShrink:0}}>✕</button></>
                      ):(
                        <span style={{fontSize:13,flex:1,lineHeight:1.5}}>{r}</span>
                      )}
                    </div>
                  ))}
                  {isEd&&(
                    <div style={{display:"flex",gap:8,marginTop:6}}>
                      <input style={{...s.inp,flex:1}} placeholder="Add responsibility..." value={newResp} onChange={e=>setNewResp(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addResp()}/>
                      <button onClick={addResp} style={s.btnSm}>+</button>
                    </div>
                  )}
                </div>
              </div>
            );
          })}
        </div>
      </div>
    );
  };

  // ── CALENDAR ──
  const Calendar=()=>{
    const cycle=i=>{const sts=["pending","in-progress","done"];const cal=[...data.calendar];cal[i]={...cal[i],status:sts[(sts.indexOf(cal[i].status)+1)%3]};upd("calendar",cal);};
    return(
      <div>
        <h1 style={{...s.h1,...GT,marginBottom:6}}>📅 Content Calendar</h1>
        <p style={{color:MT,marginBottom:16,fontSize:12}}>Tap status to cycle: pending → in-progress → done</p>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {data.calendar.map((c,i)=>(
            <div key={i} style={{...s.card,marginBottom:0}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
                <div>
                  <div style={{fontWeight:800,fontSize:14,color:PK}}>{c.day}</div>
                  <div style={{fontSize:13,marginTop:2}}>{c.type}</div>
                  <div style={{fontSize:11,color:MT,marginTop:3}}>👤 {c.assigned} · {c.niche}</div>
                </div>
                <button onClick={()=>cycle(i)} style={{...s.btnGh,flexShrink:0,fontSize:12,color:c.status==="done"?"#4ADE80":c.status==="in-progress"?GO:MT,borderColor:c.status==="done"?"#4ADE8044":c.status==="in-progress"?GO+"44":BD}}>
                  {c.status==="done"?"✅ Done":c.status==="in-progress"?"⏳ Active":"⏸ Pending"}
                </button>
              </div>
            </div>
          ))}
        </div>
        <div style={{...s.card,marginTop:12}}>
          <p style={{fontWeight:700,marginBottom:10,fontSize:14}}>⏰ Best Posting Times</p>
          {[["6–8am","Morning scroll"],["12–1pm","Lunch break"],["8–10pm","After kids' bedtime"]].map(([t,s2])=>(
            <div key={t} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:`1px solid ${BD}`}}>
              <span style={{fontWeight:700,...GT,fontSize:14}}>{t}</span>
              <span style={{color:MT,fontSize:12}}>{s2}</span>
            </div>
          ))}
        </div>
      </div>
    );
  };

  // ── PRODUCTS ──
  const Products=()=>{
    const [editId,setEditId]=useState(null);
    const [draft,setDraft]=useState(null);
    const startEdit=p=>{setEditId(p.id);setDraft({...p});};
    const cancelEdit=()=>{setEditId(null);setDraft(null);};
    const saveEdit=()=>{upd("products",data.products.map(p=>p.id===editId?{...draft}:p));cancelEdit();showToast("✅ Saved!");};
    const ud=(f,v)=>setDraft(d=>({...d,[f]:v}));
    return(
      <div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <h1 style={{...s.h1,...GT}}>📦 Products</h1>
          <button style={s.btnSm} onClick={()=>setAddProd(!addProd)}>{addProd?"✕":"+ Add"}</button>
        </div>
        {addProd&&(
          <div style={{...s.card,border:`1px solid ${PK}44`,marginBottom:16}}>
            <p style={{fontWeight:700,marginBottom:12}}>New Product</p>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              <div><label style={s.lbl}>Name</label><input style={s.inp} value={newProd.name} onChange={e=>setNewProd(p=>({...p,name:e.target.value}))}/></div>
              <div className="g2" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                <div><label style={s.lbl}>Category</label><select style={s.inp} value={newProd.cat} onChange={e=>setNewProd(p=>({...p,cat:e.target.value}))}><option>Luxury Beauty</option><option>Standard Beauty</option><option>Office</option></select></div>
                <div><label style={s.lbl}>Commission %</label><input style={s.inp} type="number" inputMode="numeric" value={newProd.rate} onChange={e=>setNewProd(p=>({...p,rate:Number(e.target.value)}))}/></div>
              </div>
              <div><label style={s.lbl}>Price Range</label><input style={s.inp} value={newProd.price} onChange={e=>setNewProd(p=>({...p,price:e.target.value}))}/></div>
              <div><label style={s.lbl}>Notes</label><input style={s.inp} value={newProd.notes} onChange={e=>setNewProd(p=>({...p,notes:e.target.value}))}/></div>
              <button style={s.btn} onClick={()=>{if(!newProd.name.trim())return;upd("products",[...data.products,{...newProd,id:Date.now(),status:"researching"}]);setNewProd({name:"",cat:"Office",rate:4,price:"",notes:""});setAddProd(false);showToast("✅ Product added!");}}>Add Product</button>
            </div>
          </div>
        )}
        {["active","researching"].map(st=>(
          <div key={st} style={{marginBottom:20}}>
            <p style={{fontWeight:700,fontSize:13,color:st==="active"?"#4ADE80":GO,marginBottom:10}}>{st==="active"?"✅ Active Products":"🔍 Researching"}</p>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {data.products.filter(p=>p.status===st).map(p=>{
                const isEd=editId===p.id;
                return(
                  <div key={p.id} style={{...s.card,marginBottom:0,border:`1px solid ${isEd?PK+"66":BD}`}}>
                    {isEd?(
                      <div>
                        <div style={{display:"flex",flexDirection:"column",gap:10}}>
                          <div><label style={s.lbl}>Name</label><input style={s.inp} value={draft.name} onChange={e=>ud("name",e.target.value)}/></div>
                          <div className="g2" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                            <div><label style={s.lbl}>Category</label><select style={s.inp} value={draft.cat} onChange={e=>ud("cat",e.target.value)}><option>Luxury Beauty</option><option>Standard Beauty</option><option>Office</option></select></div>
                            <div><label style={s.lbl}>Status</label><select style={s.inp} value={draft.status} onChange={e=>ud("status",e.target.value)}><option value="active">Active</option><option value="researching">Researching</option></select></div>
                            <div><label style={s.lbl}>Commission %</label><input style={s.inp} type="number" inputMode="numeric" value={draft.rate} onChange={e=>ud("rate",Number(e.target.value))}/></div>
                            <div><label style={s.lbl}>Price Range</label><input style={s.inp} value={draft.price} onChange={e=>ud("price",e.target.value)}/></div>
                          </div>
                          <div><label style={s.lbl}>Notes</label><input style={s.inp} value={draft.notes} onChange={e=>ud("notes",e.target.value)}/></div>
                        </div>
                        <div style={{display:"flex",gap:8,marginTop:12,flexWrap:"wrap"}}>
                          <button onClick={saveEdit} style={s.btnSm}>✓ Save</button>
                          <button onClick={cancelEdit} style={s.btnGh}>Cancel</button>
                          <button onClick={()=>{upd("products",data.products.filter(x=>x.id!==p.id));cancelEdit();showToast("🗑️ Deleted");}} style={{...s.btnDanger,marginLeft:"auto"}}>Delete</button>
                        </div>
                      </div>
                    ):(
                      <div>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10}}>
                          <div style={{flex:1,minWidth:0}}>
                            <div style={{fontWeight:700,fontSize:13}}>{p.name}</div>
                            <div style={{fontSize:11,color:MT,marginTop:2}}>{p.notes}</div>
                          </div>
                          <button onClick={()=>startEdit(p)} style={s.btnGh}>✏️</button>
                        </div>
                        <div style={{display:"flex",gap:8,marginTop:8,flexWrap:"wrap",alignItems:"center"}}>
                          {badge(p.cat,p.cat.includes("Luxury")?GO:p.cat==="Office"?"#60A5FA":PK)}
                          <span style={{fontWeight:900,fontSize:16,...GT}}>{p.rate}%</span>
                          <span style={{fontSize:12,color:MT}}>{p.price}</span>
                        </div>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        ))}
      </div>
    );
  };

  // ── TASKS ──
  const Tasks=()=>{
    const filt=tfilt==="All"?data.tasks:data.tasks.filter(t=>t.assigned===tfilt);
    return(
      <div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <h1 style={{...s.h1,...GT}}>✅ Tasks</h1>
        </div>
        <div style={{display:"flex",gap:6,marginBottom:14,flexWrap:"wrap"}}>
          {["All","Dad","Son","Wife"].map(m=>(
            <button key={m} onClick={()=>setTfilt(m)} style={{...s.btnGh,background:tfilt===m?G:"transparent",color:tfilt===m?"#fff":MT,border:tfilt===m?"none":`1px solid ${BD}`,fontSize:12,padding:"7px 12px"}}>{m}</button>
          ))}
        </div>
        <div style={s.card}>
          <div style={{display:"flex",flexDirection:"column",gap:9}}>
            <input style={s.inp} placeholder="New task..." value={newTask.text} onChange={e=>setNewTask(t=>({...t,text:e.target.value}))}/>
            <div style={{display:"flex",gap:8}}>
              <select style={{...s.inp,flex:1}} value={newTask.assigned} onChange={e=>setNewTask(t=>({...t,assigned:e.target.value}))}><option>Dad</option><option>Son</option><option>Wife</option></select>
              <select style={{...s.inp,flex:1}} value={newTask.priority} onChange={e=>setNewTask(t=>({...t,priority:e.target.value}))}><option value="high">High</option><option value="medium">Medium</option><option value="low">Low</option></select>
            </div>
            <button style={s.btn} onClick={()=>{if(!newTask.text.trim())return;upd("tasks",[...data.tasks,{...newTask,id:Date.now(),done:false}]);setNewTask({text:"",assigned:"Dad",priority:"high"});showToast("✅ Task added!");}}>+ Add Task</button>
          </div>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:7}}>
          {filt.map(t=>(
            <div key={t.id} style={{...s.card,marginBottom:0,opacity:t.done?0.45:1}}>
              <div style={{display:"flex",alignItems:"flex-start",gap:10}}>
                <input type="checkbox" checked={t.done} onChange={()=>upd("tasks",data.tasks.map(x=>x.id===t.id?{...x,done:!x.done}:x))} style={{marginTop:2,flexShrink:0}}/>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,textDecoration:t.done?"line-through":"none",lineHeight:1.4}}>{t.text}</div>
                  <div style={{display:"flex",gap:6,marginTop:6,flexWrap:"wrap"}}>
                    {badge(t.assigned,t.assigned==="Dad"?PK:t.assigned==="Son"?PU:GO)}
                    {badge(t.priority,t.priority==="high"?"#F87171":t.priority==="medium"?GO:MT)}
                  </div>
                </div>
                <button onClick={()=>upd("tasks",data.tasks.filter(x=>x.id!==t.id))} style={{background:"none",border:"none",color:"#F87171",cursor:"pointer",fontSize:18,padding:"0 4px",flexShrink:0}}>✕</button>
              </div>
            </div>
          ))}
          {!filt.length&&<p style={{color:MT,textAlign:"center",padding:"28px 0",fontSize:13}}>All caught up! 🎉</p>}
        </div>
      </div>
    );
  };

  // ── GOALS ──
  const Goals=()=>{
    const phases=[{key:"day30",label:"Phase 1 — Days 1–30",sub:"Build Proof",col:PK},{key:"day60",label:"Phase 2 — Days 31–60",sub:"Double Down",col:PU},{key:"day90",label:"Phase 3 — Days 61–90",sub:"High Ticket",col:GO}];
    return(
      <div>
        <h1 style={{...s.h1,...GT,marginBottom:16}}>🎯 90-Day Goals</h1>
        {phases.map(p=>{
          const items=data.goals[p.key];const dn=items.filter(i=>i.done).length;
          return(
            <div key={p.key} style={{...s.card,borderLeft:`4px solid ${p.col}`}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                <div><div style={{fontWeight:800,fontSize:13}}>{p.label}</div><div style={{color:MT,fontSize:11}}>{p.sub}</div></div>
                <div style={{textAlign:"right"}}><div style={{fontWeight:900,fontSize:18,color:p.col}}>{dn}/{items.length}</div></div>
              </div>
              <div style={{marginBottom:10}}><Prog pct={items.length?Math.round((dn/items.length)*100):0} col={p.col}/></div>
              {items.map((item,j)=>(
                <div key={j} style={{display:"flex",gap:10,alignItems:"flex-start",padding:"9px 10px",background:BG,borderRadius:8,marginBottom:5}}>
                  <input type="checkbox" checked={item.done} onChange={()=>{const g={...data.goals};g[p.key]=items.map((x,k)=>k===j?{...x,done:!x.done}:x);upd("goals",g);}} style={{marginTop:1,flexShrink:0}}/>
                  <span style={{fontSize:13,textDecoration:item.done?"line-through":"none",color:item.done?MT:TX,lineHeight:1.4}}>{item.text}</span>
                </div>
              ))}
            </div>
          );
        })}
      </div>
    );
  };

  // ── SCRIPTS ──
  const Scripts=()=>(
    <div>
      <h1 style={{...s.h1,...GT,marginBottom:16}}>📝 Scripts Library</h1>
      <div className="scripts-grid" style={{display:"grid",gridTemplateColumns:"1fr",gap:14}}>
        <div className="scripts-list" style={{display:"flex",flexDirection:"row",overflowX:"auto",gap:8,paddingBottom:4}}>
          {data.scripts.map(sc=>(
            <div key={sc.id} onClick={()=>setSelScript(sc)} style={{...s.card,cursor:"pointer",marginBottom:0,minWidth:140,flexShrink:0,borderLeft:`3px solid ${selScript?.id===sc.id?PK:BD}`,opacity:selScript?.id===sc.id?1:0.65}}>
              <div style={{fontWeight:700,fontSize:12}}>Week {sc.week} · {sc.day}</div>
              <div style={{fontSize:11,color:MT,margin:"3px 0"}}>{sc.product}</div>
              {badge(sc.niche,sc.niche==="Office"?"#60A5FA":sc.niche==="Both"?GO:PK)}
            </div>
          ))}
        </div>
        <div className="scripts-detail" style={{...s.card,minHeight:300}}>
          {selScript?(
            <>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14,flexWrap:"wrap",gap:8}}>
                <div><div style={{fontWeight:800,fontSize:14}}>{selScript.product}</div><div style={{color:MT,fontSize:11,marginTop:2}}>{selScript.day} · {selScript.niche}</div></div>
                <button style={s.btnSm} onClick={()=>copyText(selScript.content)}>📋 Copy Script</button>
              </div>
              <pre style={{whiteSpace:"pre-wrap",fontSize:13,lineHeight:1.8,fontFamily:"inherit",color:TX,overflowX:"auto"}}>{selScript.content}</pre>
            </>
          ):(
            <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:200,color:MT,fontSize:13,textAlign:"center"}}>👆 Tap a script above to view it</div>
          )}
        </div>
      </div>
    </div>
  );

  // ── EXPORT ──
  const Export=()=>(
    <div>
      <h1 style={{...s.h1,...GT,marginBottom:6}}>🔄 Export for Claude</h1>
      <p style={{color:MT,marginBottom:16,fontSize:12}}>Generate a brief to paste into Claude</p>
      <div style={s.card}>
        <p style={{fontWeight:700,marginBottom:8,fontSize:14}}>📝 Team Notes</p>
        <textarea style={{...s.ta,minHeight:120,marginBottom:14}} value={data.notes} onChange={e=>upd("notes",e.target.value)} placeholder="This week's updates, wins, blockers..."/>
        <button style={s.btn} onClick={exportBrief}>📋 Generate & Copy Brief</button>
      </div>
      <div style={s.card}>
        <p style={{fontWeight:700,marginBottom:8,fontSize:14}}>💡 How to use</p>
        <div style={{fontSize:13,color:MT,lineHeight:1.9}}>
          1. Tap "Generate & Copy Brief"<br/>
          2. Open Claude.ai → new chat<br/>
          3. Paste brief → ask your question<br/><br/>
          <strong style={{color:TX}}>Example question:</strong><br/>
          "Write Week 2 scripts for the Biodance mask."
        </div>
      </div>
    </div>
  );

  const views={dashboard:Dashboard,team:Team,calendar:Calendar,products:Products,tasks:Tasks,goals:Goals,scripts:Scripts,export:Export};
  const View=views[tab]||Dashboard;

  return(
    <div style={s.wrap}>
      {/* ── DESKTOP SIDEBAR ── */}
      <div className="sidebar" style={s.sidebar}>
        <div style={{padding:"20px 14px 14px",borderBottom:`1px solid ${BD}`}}>
          <div style={{...GT,fontSize:19,fontWeight:900}}>Salo's ✨</div>
          <div style={{fontSize:10,color:MT,letterSpacing:"0.8px",marginTop:2}}>VIRTUAL SOLUTIONS</div>
        </div>
        <nav style={{flex:1,padding:"8px 0",overflowY:"auto"}}>
          {NAVITEMS.map(n=>(
            <div key={n.id} onClick={()=>setTab(n.id)} style={{display:"flex",alignItems:"center",gap:8,padding:"10px 12px",margin:"1px 6px",borderRadius:9,cursor:"pointer",fontSize:13,fontWeight:tab===n.id?700:400,color:tab===n.id?TX:MT,background:tab===n.id?"rgba(232,64,154,0.15)":"transparent",borderLeft:tab===n.id?`3px solid ${PK}`:"3px solid transparent"}}>
              <span style={{fontSize:15}}>{n.icon}</span><span>{n.label}</span>
            </div>
          ))}
        </nav>
        <div style={{padding:12,borderTop:`1px solid ${BD}`,fontSize:10,color:"#4a2a6a",textAlign:"center",lineHeight:1.6}}>
          salosdigitalmarketing.com<br/>
          <span style={{...GT,fontWeight:700,fontSize:10}}>© 2026 Sandra Lorena</span>
        </div>
      </div>

      {/* ── MAIN ── */}
      <div className="main-content" style={s.main}><View/></div>

      {/* ── MOBILE BOTTOM NAV ── */}
      <nav className="bottom-nav">
        {NAVITEMS.map(n=>(
          <div key={n.id} onClick={()=>setTab(n.id)} style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"6px 10px",minWidth:58,cursor:"pointer",color:tab===n.id?PK:MT,flex:"1 1 auto"}}>
            <span style={{fontSize:20}}>{n.icon}</span>
            <span style={{fontSize:9,marginTop:2,fontWeight:tab===n.id?700:400,whiteSpace:"nowrap"}}>{n.label}</span>
          </div>
        ))}
      </nav>

      {/* ── TOAST ── */}
      {toast&&(
        <div style={{position:"fixed",bottom:90,left:"50%",transform:"translateX(-50%)",background:CD,border:`1px solid ${PK}`,borderRadius:30,padding:"10px 20px",fontSize:13,fontWeight:700,color:TX,zIndex:999,whiteSpace:"nowrap",boxShadow:"0 8px 32px rgba(0,0,0,0.5)"}}>
          {toast}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
